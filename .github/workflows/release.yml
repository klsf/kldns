name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  prepare:
    name: Check and build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.7"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Check frontend
        working-directory: web
        run: |
          npm run typecheck
          npm run lint

      - name: Build frontend
        working-directory: web
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Test backend
        run: go list ./... | grep -v '/web/node_modules/' | xargs go test

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: kldns
            archive: tar.gz
          - goos: linux
            goarch: arm64
            binary: kldns
            archive: tar.gz
          - goos: windows
            goarch: amd64
            binary: kldns.exe
            archive: zip
          - goos: darwin
            goarch: amd64
            binary: kldns
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            binary: kldns
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.7"
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build/package
          go build -trimpath -ldflags="-s -w" -o "build/package/${{ matrix.binary }}" .
          cp README.md build/package/
          cp config.yaml build/package/

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          cd build/package
          tar -czf "../kldns-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" .

      - name: Package zip
        if: matrix.archive == 'zip'
        run: |
          cd build/package
          zip -r "../kldns-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kldns-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/kldns-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  publish:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: kldns-${{ github.ref_name }}-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
